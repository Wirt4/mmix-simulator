services:
  web:
    build:
      target: production
    profiles: [prod]
    ports:
    - "80:80"
    environment:
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
  development:
    build:
      target: dev
    cap_add:
    - SYSLOG
    profiles: [dev]
    environment:
      RAILS_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
    command: bin/rails server -b 0.0.0.0
