services:
  web:
    build:
      target: production
    profiles: [prod]
    ports:
    - "80:80"
    environment:
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
  development:
    build:
      target: dev
    cap_add:
    - SYSLOG
    profiles: [dev]
    environment:
      RAILS_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
    command: bash -c "cp /opt/wasm-cache/mmix.js /opt/wasm-cache/mmix.wasm public/ && cp /opt/wasm-cache/module.d.ts app/javascript/types/module.d.ts && bin/rails server -b 0.0.0.0"
