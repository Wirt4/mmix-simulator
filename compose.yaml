name: "mmix_simulator"

services:
  rails-app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile

    volumes:
    - .:/workspaces/mmix-simulator:cached

    ports:
    - "3000:3000"

    security_opt:
    - seccomp=unconfined
    - apparmor=unconfined

    cap_add:
    - SYS_ADMIN

    command: sleep infinity

    depends_on:
    - selenium

  selenium:
    image: selenium/standalone-chromium
    restart: unless-stopped
