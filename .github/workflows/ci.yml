name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager
      
      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit
      
  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    # services:
    #  redis:
    #    image: valkey/valkey:8
    #    ports:
    #      - 6379:6379
    #    options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install JavaScript dependencies
        run: npm install

      - name: Install MMIX sandbox dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y bubblewrap python3-seccomp texlive-binaries build-essential
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Build MMIX binaries from vendored source
        run: |
          cd vendor/mmixware
          export CWEBINPUTS=.
          ctangle mmix-arith.w
          ctangle mmix-io.w
          ctangle mmix-sim.w
          ctangle mmixal.w
          ctangle abstime.w
          gcc -O0 -c mmix-arith.c
          gcc -O0 -c mmix-io.c
          gcc -O0 -o abstime abstime.c
          ./abstime > abstime.h
          gcc -O0 mmixal.c mmix-arith.o -o mmixal
          gcc -O0 mmix-sim.c mmix-arith.o mmix-io.o -o mmix
          sudo cp mmix mmixal /usr/local/bin/

      - name: Set up bwrap-seccomp
        run: |
          chmod +x script/bwrap_seccomp.py
          sudo ln -s ${{ github.workspace }}/script/bwrap_seccomp.py /usr/local/bin/bwrap-seccomp

      - name: Strace bwrap-seccomp to find all required syscalls
        run: |
          cd /tmp && echo -e "LOC #100\nMain TRAP 0,Halt,0" > test.mms
          strace -ff -o /tmp/bwrap_trace bwrap-seccomp -a mmixal test.mms 2>&1 || true
          echo "=== All syscalls across all pids ==="
          cat /tmp/bwrap_trace.* | awk -F'(' '{print $1}' | sed 's/^ *//' | sort -u

      - name: Run tests
        env:
          RAILS_ENV: test
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test

  system-test:
    runs-on: ubuntu-latest

    # services:
    #  redis:
    #    image: valkey/valkey:8
    #    ports:
    #      - 6379:6379
    #    options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install MMIX sandbox dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y bubblewrap python3-seccomp texlive-binaries build-essential
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Build MMIX binaries from vendored source
        run: |
          cd vendor/mmixware
          export CWEBINPUTS=.
          ctangle mmix-arith.w
          ctangle mmix-io.w
          ctangle mmix-sim.w
          ctangle mmixal.w
          ctangle abstime.w
          gcc -O0 -c mmix-arith.c
          gcc -O0 -c mmix-io.c
          gcc -O0 -o abstime abstime.c
          ./abstime > abstime.h
          gcc -O0 mmixal.c mmix-arith.o -o mmixal
          gcc -O0 mmix-sim.c mmix-arith.o mmix-io.o -o mmix
          sudo cp mmix mmixal /usr/local/bin/

      - name: Set up bwrap-seccomp
        run: |
          chmod +x script/bwrap_seccomp.py
          sudo ln -s ${{ github.workspace }}/script/bwrap_seccomp.py /usr/local/bin/bwrap-seccomp

      - name: Run System Tests
        env:
          RAILS_ENV: test
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
