name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-24.04
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          load: true
          tags: mmix-simulator:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Diagnose bwrap inside container
        run: |
          docker run --rm --privileged mmix-simulator:test bash -c '
            echo "=== Environment ==="
            uname -a
            cat /proc/sys/kernel/unprivileged_userns_clone 2>/dev/null || echo "userns_clone: not present"
            cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || echo "apparmor_restrict: not present"
            which bwrap && bwrap --version
            which mmixal && mmixal --version 2>&1 || true

            echo "=== Direct mmixal test ==="
            cd /tmp && mkdir diagtest && cd diagtest
            printf "\tLOC\t#100\nMain\tTRAP\t0,Halt,0\n" > test.mms
            mmixal test.mms 2>&1; echo "mmixal exit: $?"
            ls -la test.mmo 2>&1

            echo "=== bwrap-seccomp test ==="
            bwrap-seccomp -a mmixal test.mms 2>&1; echo "bwrap exit: $?"
            ls -la test.mmo 2>&1

            echo "=== Ruby Open3 test ==="
            ruby -e "
              require \"open3\"
              require \"tmpdir\"
              Dir.mktmpdir do |dir|
                File.binwrite(File.join(dir, \"test.mms\"), \"\tLOC\t#100\nMain\tTRAP\t0,Halt,0\n\")
                cmd = [\"bwrap-seccomp\", \"-a\", \"mmixal\", \"test.mms\"]
                out, err, st = Open3.capture3(*cmd, chdir: dir)
                puts \"stdout=#{out.inspect}\"
                puts \"stderr=#{err.inspect}\"
                puts \"status=#{st.exitstatus}\"
                puts \"files=#{Dir.entries(dir).inspect}\"
              end
            "
          '

      - name: Run tests
        run: >
          docker run --rm
          --privileged
          mmix-simulator:test
          bash -c "bin/setup --skip-server && bin/rails test"
